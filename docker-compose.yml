# Default mode: one-command startup for new users.
# Start with: docker compose up -d --build
# If you already run a shared SurrealDB service, use docker-compose.shared.yml instead.

services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: podcast-geeker-surrealdb
    user: root
    command: start --user root --pass root --bind 0.0.0.0:8000 file:/data/surreal.db
    environment:
      - SURREAL_EXPERIMENTAL_GRAPHQL=true
    volumes:
      - surrealdb_data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  podcast-geeker:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_ENABLE_CHARACTER_CURSOR: "true"
    image: podcast-geeker:v1
    container_name: podcast-geeker
    ports:
      - "8502:8502"  # Web UI
      - "5055:5055"  # REST API
    environment:
      # REQUIRED: Change this to your own secret string
      - PODCAST_GEEKER_ENCRYPTION_KEY=my-super-secret-podcast-geeker-2026
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=podcast_geeker
      - SURREAL_DATABASE=podcast_geeker
      - OLLAMA_API_BASE=http://host.docker.internal:11434
    volumes:
      - ./notebook_data:/app/data
    depends_on:
      surrealdb:
        condition: service_started
    restart: unless-stopped

volumes:
  surrealdb_data:
